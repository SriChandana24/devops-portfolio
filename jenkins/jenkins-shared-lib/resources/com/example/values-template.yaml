# Shared values overlay applied on top of service-specific values.
# Load from a vars/ or src/ file via:
#   def tpl = libraryResource('com/example/values-template.yaml')

global:
  imageRegistry: registry.example.com
  imagePullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
